version: '3.8'

services:
  # 1. API Backend (FastAPI)
  api:
    build: ./backend
    container_name: smart-ped-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/smart_ped
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  # 2. Detector (YOLO11)
  detector:
    build: ./detector
    container_name: smart-ped-detector
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - kafka

  # 3. Tracker (BoT-SORT)
  tracker:
    build: ./tracker
    container_name: smart-ped-tracker
    depends_on:
      - redis
      - influxdb

  # 4. Predictor (Social-Graph Transformer)
  predictor:
    build: ./predictor
    container_name: smart-ped-predictor
    depends_on:
      - kafka

  # 5. Anomaly Detector
  anomaly:
    build: ./anomaly
    container_name: smart-ped-anomaly
    depends_on:
      - postgres
      - minio

  # Infrastructure
  postgres:
    image: ankane/pgvector
    container_name: smart-ped-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=smart_ped
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:alpine
    container_name: smart-ped-redis

  kafka:
    image: bitnami/kafka:latest
    container_name: smart-ped-kafka
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

  minio:
    image: minio/minio
    container_name: smart-ped-storage
    command: server /data

  influxdb:
    image: influxdb:2.0
    container_name: smart-ped-metrics

  nginx:
    image: nginx:alpine
    container_name: smart-ped-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
